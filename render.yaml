# Render.com infrastructure-as-code for the Skylight demo.
# Deploys a free Web Service that serves the animated display + control panel
# using historical flight data (no radio, no API key needed).
#
# How to deploy:
#   1. Push this repo to GitHub.
#   2. Go to https://dashboard.render.com/
#   3. Click "New +" → "Web Service" → connect your repo.
#   4. Use the settings below (Render will auto-detect them).
#   5. Select "Free" plan.
#   6. Done. Your app will be live at https://skylight-demo.onrender.com

services:
  - type: web
    name: skylight-demo
    env: node
    region: oregon
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3000"
      - key: DATA_SOURCE
        value: "api"
      - key: API_PROVIDER
        value: "adsb-lol"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SFO_GROUND_ENABLED
        value: "0"
      - key: SUPPLEMENT_API
        value: "0"