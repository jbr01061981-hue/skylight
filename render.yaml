# Render.com infrastructure-as-code for the Skylight demo.
# Deploys a free Web Service that serves the animated display + control panel
# using historical flight data (no radio, no API key needed).
#
# How to deploy:
#   1. Push this repo to GitHub.
#   2. Go to https://dashboard.render.com/select-repo
#   3. Connect your repo — Render will auto-detect render.yaml.
#   4. Click "Create New Resources" → "Blueprint" → select your repo.
#   5. Done. Your app will be live at https://skylight-demo.onrender.com
#
# Or manually (if you skip the blueprint):
#   1. New Web Service → connect your repo.
#   2. Name: "skylight-demo"
#   3. Build Command: pnpm install && pnpm build
#   4. Start Command: pnpm start
#   5. Select "Free" plan.

blueprint:
  - type: web
    name: skylight-demo
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3000"
      - key: DATA_SOURCE
        value: "api"
      - key: API_PROVIDER
        value: "adsb-lol"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SFO_GROUND_ENABLED
        value: "0"
      - key: SUPPLEMENT_API
        value: "0"